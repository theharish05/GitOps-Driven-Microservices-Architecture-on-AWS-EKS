apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: robot-shop
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/instana/robot-shop.git'
    path: K8s/helm
    targetRevision: master
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: robot-shop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
